# =============================================================================
# FluxCart Kafka Cluster — docker-compose.yml
# =============================================================================
#
# WHAT THIS FILE DOES:
#   Starts a 3-broker Kafka cluster on your local machine using Docker.
#   No ZooKeeper. Uses KRaft mode — Kafka manages its own metadata internally.
#
# ARCHITECTURE:
#   broker-1 → acts as BOTH controller and broker (manages cluster + stores data)
#   broker-2 → pure broker (stores data, serves producers and consumers)
#   broker-3 → pure broker (stores data, serves producers and consumers)
#
# HOW TO START:
#   docker compose up -d
#
# HOW TO STOP:
#   docker compose down
#
# HOW TO STOP AND DELETE ALL DATA:
#   docker compose down -v
#
# HOW TO CHECK LOGS:
#   docker compose logs -f broker-1
# =============================================================================

version: '3.8'

# ---------------------------------------------------------------------------
# NETWORKS
# ---------------------------------------------------------------------------
# We create a dedicated Docker network called "fluxcart-network".
# All three brokers join this network so they can find each other
# using their container names (broker-1, broker-2, broker-3) as hostnames.
# Without this, brokers cannot talk to each other internally.
# ---------------------------------------------------------------------------
networks:
  fluxcart-network:
    driver: bridge  # standard Docker network — containers on same host talk freely


# ---------------------------------------------------------------------------
# VOLUMES
# ---------------------------------------------------------------------------
# Each broker gets its own named volume to persist data on disk.
# This means if you stop and restart the cluster, your Kafka data survives.
# Run "docker compose down -v" only when you want to wipe everything clean.
# ---------------------------------------------------------------------------
volumes:
  broker1-data:   # persistent storage for broker-1's partition logs
  broker2-data:   # persistent storage for broker-2's partition logs
  broker3-data:   # persistent storage for broker-3's partition logs


# ---------------------------------------------------------------------------
# SERVICES
# ---------------------------------------------------------------------------
# Each "service" is one Docker container. We define three brokers.
# They all use the same Kafka image but with different configurations.
# ---------------------------------------------------------------------------
services:

  # =========================================================================
  # BROKER 1 — Controller + Broker
  # =========================================================================
  # This is the most important container. In KRaft mode, someone needs to act
  # as the "controller" — the node that manages cluster metadata, decides who
  # leads each partition, and handles broker failures.
  #
  # PROCESS_ROLES: "broker,controller" means this single node does both jobs.
  # In production you would separate controllers from brokers, but for local
  # development combining them keeps things simple.
  # =========================================================================
  broker-1:
    image: confluentinc/cp-kafka:7.6.0   # Confluent's Kafka image, version 7.6.0
                                          # (Kafka 3.6 under the hood — full KRaft support)
    container_name: fluxcart-broker-1     # friendly name so "docker ps" is readable

    networks:
      - fluxcart-network                  # join our shared network

    ports:
      # Format is "HOST_PORT:CONTAINER_PORT"
      # 9092 on your laptop maps to 9092 inside this container.
      # Your Python producer/consumers connect to localhost:9092 to reach broker-1.
      - "9092:9092"

    volumes:
      # Mount the named volume into the container at Kafka's data directory.
      # All partition logs, segment files, and metadata are stored here.
      - broker1-data:/var/lib/kafka/data

    environment:
      # -----------------------------------------------------------------------
      # KRAFT IDENTITY
      # -----------------------------------------------------------------------

      # KAFKA_NODE_ID: unique integer ID for this broker within the cluster.
      # No two brokers can share the same node ID — Kafka uses this to tell
      # brokers apart. Must be a positive integer.
      KAFKA_NODE_ID: 1

      # KAFKA_PROCESS_ROLES: what role(s) this node plays.
      # "broker"     = stores partitions, serves producers and consumers
      # "controller" = manages cluster metadata, elects partition leaders
      # "broker,controller" = does both (fine for local dev, not for prod)
      KAFKA_PROCESS_ROLES: broker,controller

      # -----------------------------------------------------------------------
      # CLUSTER ID
      # -----------------------------------------------------------------------
      # A base64-encoded UUID that uniquely identifies this Kafka cluster.
      # ALL brokers in the same cluster must have the EXACT same CLUSTER_ID.
      # If two brokers have different cluster IDs, they refuse to join together.
      #
      # How was this generated?
      #   docker run --rm confluentinc/cp-kafka:7.6.0 kafka-storage random-uuid
      # Generate it once. Hardcode it. Never change it for the life of the cluster.
      # -----------------------------------------------------------------------
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

      # -----------------------------------------------------------------------
      # CONTROLLER CONFIGURATION
      # -----------------------------------------------------------------------
      # KAFKA_CONTROLLER_QUORUM_VOTERS tells every broker in the cluster
      # "here is the complete list of nodes that can be elected controller".
      #
      # Format: "node_id@hostname:controller_port,node_id@hostname:controller_port"
      #
      # We only have one controller (broker-1, node 1).
      # It is reachable inside Docker at hostname "broker-1" on port 9093.
      # Port 9093 is the internal controller port — clients never connect here.
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker-1:9093"

      # -----------------------------------------------------------------------
      # LISTENER CONFIGURATION
      # -----------------------------------------------------------------------
      # This is the most confusing part of Kafka networking. Read carefully.
      #
      # Kafka needs TWO types of addresses:
      #
      # 1. INTERNAL address — used by brokers to talk to each other
      #    and by the controller. Uses Docker hostnames (broker-1, broker-2...).
      #
      # 2. EXTERNAL address — used by your Python code running outside Docker.
      #    Uses "localhost" with a specific port number.
      #
      # KAFKA_LISTENERS: the addresses THIS broker actually BINDS to (listens on).
      #   INTERNAL://0.0.0.0:29092  → listens on all interfaces, port 29092 (broker-to-broker)
      #   EXTERNAL://0.0.0.0:9092   → listens on all interfaces, port 9092 (client-facing)
      #   CONTROLLER://0.0.0.0:9093 → listens on all interfaces, port 9093 (controller only)
      #
      # 0.0.0.0 means "accept connections on any network interface" — necessary
      # because Docker assigns IPs dynamically and we don't know them upfront.
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093

      # KAFKA_ADVERTISED_LISTENERS: the addresses THIS broker TELLS clients to use.
      # This is what gets published to the cluster so other nodes know how to reach here.
      #
      #   INTERNAL://broker-1:29092 → other brokers reach this one via Docker hostname
      #   EXTERNAL://localhost:9092  → your Python code reaches this one via localhost
      #
      # WHY TWO DIFFERENT ADDRESSES?
      # Your Python producer runs outside Docker. It cannot reach "broker-1" as a hostname
      # because that only resolves inside Docker's network. It uses "localhost:9092".
      # But broker-2 and broker-3 ARE inside Docker, so they use "broker-1:29092".
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker-1:29092,EXTERNAL://localhost:9092

      # KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: tells Kafka which security protocol
      # to use for each listener. PLAINTEXT means no encryption (fine for local dev).
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

      # KAFKA_INTER_BROKER_LISTENER_NAME: which listener brokers use to talk to each other.
      # We use INTERNAL so broker-to-broker traffic uses the internal Docker network.
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # KAFKA_CONTROLLER_LISTENER_NAMES: which listener the controller uses.
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # -----------------------------------------------------------------------
      # REPLICATION AND RELIABILITY
      # -----------------------------------------------------------------------

      # KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: how many copies of the internal
      # __consumer_offsets topic to keep. This topic stores where each consumer
      # group is in each partition. Setting 3 means it survives two broker failures.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3

      # KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: replication for the
      # internal transaction log (used for exactly-once semantics).
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3

      # KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: minimum in-sync replicas required
      # before a transaction can commit. ISR = replicas fully caught up with leader.
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

      # -----------------------------------------------------------------------
      # DEFAULT TOPIC SETTINGS
      # -----------------------------------------------------------------------

      # KAFKA_NUM_PARTITIONS: default partition count for auto-created topics.
      # We set 3 as a sensible default. Our setup_topics.py overrides this
      # per-topic based on actual throughput requirements.
      KAFKA_NUM_PARTITIONS: 3

      # KAFKA_DEFAULT_REPLICATION_FACTOR: default replication factor for
      # auto-created topics. 3 means every partition has 3 copies — one on
      # each broker. Survives one broker failure without data loss.
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3

      # KAFKA_MIN_INSYNC_REPLICAS: minimum number of replicas that must
      # acknowledge a write before it is considered successful (when acks=all).
      # 2 means at least 2 out of 3 replicas must confirm. Balances
      # durability with availability — the cluster can still write even if
      # one broker is temporarily slow.
      KAFKA_MIN_INSYNC_REPLICAS: 2

      # -----------------------------------------------------------------------
      # LOG SETTINGS
      # -----------------------------------------------------------------------

      # KAFKA_LOG_DIRS: where Kafka stores partition data on disk inside the container.
      # This path is mapped to our named volume (broker1-data) so data persists.
      KAFKA_LOG_DIRS: /var/lib/kafka/data

      # KAFKA_LOG_RETENTION_HOURS: default retention for topic data — 168 hours = 7 days.
      # Our setup_topics.py overrides this per-topic (payments = 90 days, etc.)
      KAFKA_LOG_RETENTION_HOURS: 168

      # KAFKA_LOG_SEGMENT_BYTES: maximum size of a single log segment file — 1GB.
      # When a segment reaches this size, Kafka closes it and opens a new one.
      # Retention cleanup operates at the segment level, not the message level.
      KAFKA_LOG_SEGMENT_BYTES: 1073741824

      # -----------------------------------------------------------------------
      # PERFORMANCE SETTINGS
      # -----------------------------------------------------------------------

      # KAFKA_AUTO_CREATE_TOPICS_ENABLE: we set this to false.
      # Topics should be created explicitly via setup_topics.py with intentional
      # partition counts and retention settings. Auto-creation produces topics
      # with default settings, which is almost never what you want in production.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      # KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: how long Kafka waits before
      # triggering a consumer group rebalance when a consumer first joins.
      # 0ms means rebalance immediately — good for local dev where you want
      # consumers to start reading as fast as possible.
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0


  # =========================================================================
  # BROKER 2 — Pure Broker
  # =========================================================================
  # Stores partition replicas, serves producers and consumers.
  # Does NOT act as a controller — only broker-1 manages cluster metadata.
  # Configuration is identical to broker-1 except:
  #   - KAFKA_NODE_ID is 2
  #   - KAFKA_PROCESS_ROLES is "broker" only (no controller role)
  #   - Ports are 9093 externally (maps to 9092 internally)
  #   - KAFKA_ADVERTISED_LISTENERS uses localhost:9093
  # =========================================================================
  broker-2:
    image: confluentinc/cp-kafka:7.6.0
    container_name: fluxcart-broker-2

    networks:
      - fluxcart-network

    ports:
      # broker-2 is reachable from your laptop at localhost:9093
      # (different port from broker-1 to avoid conflict on the same machine)
      - "9093:9092"

    volumes:
      - broker2-data:/var/lib/kafka/data

    environment:
      KAFKA_NODE_ID: 2                          # unique ID — must differ from broker-1
      KAFKA_PROCESS_ROLES: broker               # broker only, not a controller
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"    # SAME cluster ID as broker-1 — mandatory

      # Still needs to know who the controllers are so it can register with them
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker-1:9093"

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      # Note: no CONTROLLER listener here — this node is not a controller

      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker-2:29092,EXTERNAL://localhost:9093
      # INTERNAL uses Docker hostname "broker-2" — resolvable inside Docker network
      # EXTERNAL uses localhost:9093 — your Python code can reach this broker here

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2

      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0


  # =========================================================================
  # BROKER 3 — Pure Broker
  # =========================================================================
  # Identical role to broker-2. Having three brokers means:
  #   - Every partition can be replicated 3 times (one copy per broker)
  #   - The cluster survives one broker going down with zero data loss
  #   - Consumer groups with up to 3 instances get one instance per broker
  #
  # This is the minimum recommended cluster size for any meaningful
  # demonstration of fault tolerance and replication.
  # =========================================================================
  broker-3:
    image: confluentinc/cp-kafka:7.6.0
    container_name: fluxcart-broker-3

    networks:
      - fluxcart-network

    ports:
      # broker-3 is reachable from your laptop at localhost:9094
      - "9094:9092"

    volumes:
      - broker3-data:/var/lib/kafka/data

    environment:
      KAFKA_NODE_ID: 3                          # unique ID — must differ from all others
      KAFKA_PROCESS_ROLES: broker               # broker only
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"    # SAME cluster ID — all three must match

      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker-1:9093"

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker-3:29092,EXTERNAL://localhost:9094
      # EXTERNAL uses localhost:9094 — your Python code can reach this broker here

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2

      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0


# =============================================================================
# WHAT TO RUN AFTER "docker compose up -d"
# =============================================================================
#
# 1. Verify all three brokers are running:
#    docker ps
#
# 2. Check broker-1 logs to confirm KRaft startup succeeded:
#    docker logs fluxcart-broker-1 | grep -i "started"
#
# 3. Verify the cluster sees all 3 brokers:
#    docker exec fluxcart-broker-1 \
#      kafka-broker-api-versions --bootstrap-server localhost:9092
#
# 4. Once healthy, run setup_topics.py to create the FluxCart topics:
#    python setup_topics.py
#
# =============================================================================