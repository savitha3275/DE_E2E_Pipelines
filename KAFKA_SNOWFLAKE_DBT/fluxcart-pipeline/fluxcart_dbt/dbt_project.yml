
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'fluxcart_dbt'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'fluxcart_dbt'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the example/
# directory as views. These settings can be overridden in the individual model
# files using the `{{ config(...) }}` macro.
models:
  fluxcart_dbt:
    staging:
      +materialized: view
    marts:
      +materialized: incremental  # use incremental for fact tables to handle new data efficiently
      +incremental_strategy: merge  # merges new rows into existing FCT tables
      +unique_key: id  # placeholder, each FCT table will have a primary key
    dims:
      +materialized: table  # dimension tables can be full tables for easier joins



#Staging as view: lightweight, just cleans and standardizes raw data; no storage overhead.
#Marts as incremental: tables grow with new data; faster and safer for production pipelines.
#+unique_key: required for incremental merge; you’ll define specific keys per FCT table.
#Later, snapshots can live under snapshots/ — no change in this section needed.
#You don’t need to touch anything else for seeds, macros, or snapshots — dbt knows where they are from the seed-paths, macro-paths, snapshot-paths in your config.